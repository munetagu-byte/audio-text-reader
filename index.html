<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>テキスト＆音声リーダー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ===== BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117; --panel:#161b22; --card:#21262d; --border:#30363d;
  --accent:#e94560; --accent2:#533483; --green:#3fb950;
  --text:#e6edf3; --muted:#7d8590;
  --hl-past:rgba(233,69,96,.18); --hl-now:rgba(233,69,96,.72);
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ===== HEADER ===== */
header{
  background:var(--panel);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;
}
header h1{font-size:1rem;font-weight:700;
  background:linear-gradient(135deg,#e94560,#533483);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;}

/* Lesson selector */
.lesson-select-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
select.lesson-sel{
  flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:5px 10px;border-radius:8px;font-size:.82rem;cursor:pointer;min-width:0;
}
.icon-btn{
  background:var(--card);border:1px solid var(--border);color:var(--text);
  width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;
}
.icon-btn:hover{background:var(--accent2);}

/* ===== MAIN AREA ===== */
.main{display:flex;flex:1;overflow:hidden;}

/* PDF Panel */
.pdf-panel{
  width:50%;border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a;
}
@media(max-width:640px){
  .main{flex-direction:column;}
  .pdf-panel{width:100%;height:42%;border-right:none;border-bottom:1px solid var(--border);}
}
.panel-bar{
  background:var(--panel);padding:5px 10px;
  font-size:.72rem;color:var(--muted);display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;
}
.page-nav{display:flex;align-items:center;gap:6px;}
.page-nav button{
  background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:2px 8px;border-radius:4px;cursor:pointer;font-size:.72rem;
}
#pdf-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px;}
#pdf-scroll canvas{max-width:100%;border-radius:3px;box-shadow:0 4px 16px rgba(0,0,0,.6);}

/* Text Panel */
.text-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#text-scroll{flex:1;overflow-y:auto;padding:18px 20px;line-height:2;word-break:break-all;}
.placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--muted);gap:10px;text-align:center;padding:20px;
}
.placeholder svg{opacity:.25;}
.placeholder p{font-size:.82rem;line-height:1.6;}

/* Text segments */
.seg{display:inline;border-radius:3px;transition:background .25s;cursor:pointer;}
.seg:hover{background:rgba(83,52,131,.35);}
.seg.past{background:var(--hl-past);}
.seg.now{background:var(--hl-now);border-radius:3px;padding:1px 2px;
  animation:pulse 1.1s ease-in-out infinite alternate;}
@keyframes pulse{from{background:rgba(233,69,96,.55);}to{background:rgba(233,69,96,.85);}}

/* ===== TRACK LIST ===== */
.track-panel{
  background:var(--panel);border-top:1px solid var(--border);
  display:none;padding:8px 14px;flex-shrink:0;
}
.track-panel.visible{display:block;}
.track-list{display:flex;flex-wrap:wrap;gap:6px;max-height:80px;overflow-y:auto;}
.track-btn{
  background:var(--card);border:1px solid var(--border);color:var(--muted);
  padding:4px 12px;border-radius:20px;font-size:.75rem;cursor:pointer;transition:all .15s;
}
.track-btn:hover{border-color:var(--accent);color:var(--text);}
.track-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}

/* ===== PLAYER ===== */
.player{
  background:var(--panel);border-top:1px solid var(--border);
  padding:10px 16px 12px;flex-shrink:0;
}
.player-inner{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:8px;}
.progress-row{display:flex;align-items:center;gap:8px;}
.time{font-size:.72rem;color:var(--muted);white-space:nowrap;min-width:36px;}
.prog-bar{
  flex:1;height:5px;background:var(--border);border-radius:4px;cursor:pointer;
  position:relative;transition:height .15s;
}
.prog-bar:hover{height:8px;}
#prog-fill{
  height:100%;background:linear-gradient(90deg,#e94560,#533483);
  border-radius:4px;width:0%;transition:width .1s linear;pointer-events:none;
}
.ctrl-row{display:flex;align-items:center;justify-content:center;gap:10px;}
.cbtn{
  background:none;border:none;color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .15s,transform .1s;padding:4px;border-radius:50%;
}
.cbtn:hover{color:var(--accent);transform:scale(1.1);}
.cbtn.play{
  background:var(--accent);border-radius:50%;width:44px;height:44px;color:#fff;
}
.cbtn.play:hover{background:#c73652;transform:scale(1.05);}
.speed-sel{
  background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:4px 8px;border-radius:6px;font-size:.78rem;cursor:pointer;
}
.vol-row{display:flex;align-items:center;gap:6px;margin-left:auto;}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:72px;height:4px;background:var(--border);border-radius:4px;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;
  border-radius:50%;background:var(--accent);cursor:pointer;
}
/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
  background:#333;color:#fff;padding:7px 16px;border-radius:20px;
  font-size:.78rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
  white-space:nowrap;
}
#toast.show{opacity:1;}
/* ===== LOADING ===== */
.loading-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;z-index:998;display:none;
}
.loading-overlay.show{display:flex;}
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- ========================================================
  🔧 設定エリア — ここにファイルを登録してください
  GitHubにアップロードしたPDFと音声のファイル名を入力します
  同じリポジトリに置いたファイルはそのままファイル名で参照できます
  サブフォルダを使う場合は "files/audio1.mp3" のように書きます
======================================================== -->
<script>
const LESSONS = [
  // --- レッスン1の例 ---
  {
    title: "レッスン 1（サンプル）",       // 表示名
    pdf:   "lesson1.pdf",                 // PDFファイル名
    tracks: [                             // 音声トラック（複数可）
      { label: "Track 1", src: "lesson1_track1.mp3" },
      { label: "Track 2", src: "lesson1_track2.mp3" },
    ]
  },
  // --- レッスン2の例 ---
  {
    title: "レッスン 2（サンプル）",
    pdf:   "lesson2.pdf",
    tracks: [
      { label: "Track 1", src: "lesson2_track1.mp3" },
    ]
  },
  // ここにコピーして追加してください ↓
  // {
  //   title: "レッスン 3",
  //   pdf:   "lesson3.pdf",
  //   tracks: [
  //     { label: "Track 1", src: "lesson3_part1.mp3" },
  //     { label: "Track 2", src: "lesson3_part2.mp3" },
  //   ]
  // },
];
</script>
<!-- ======================================================== -->

<!-- HEADER -->
<header>
  <h1>📖 リーダー</h1>
  <div class="lesson-select-wrap">
    <select class="lesson-sel" id="lesson-sel"></select>
    <button class="icon-btn" id="font-down" title="文字を小さく">A-</button>
    <button class="icon-btn" id="font-up"   title="文字を大きく">A+</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <!-- PDF -->
  <div class="pdf-panel">
    <div class="panel-bar">
      <span id="pdf-name">PDF</span>
      <div class="page-nav">
        <button id="prev-page">◀</button>
        <span id="page-info">- / -</span>
        <button id="next-page">▶</button>
      </div>
    </div>
    <div id="pdf-scroll">
      <div class="placeholder" id="pdf-placeholder">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p>上のセレクターでレッスンを選択してください</p>
      </div>
    </div>
  </div>

  <!-- Text -->
  <div class="text-panel">
    <div class="panel-bar">テキスト（音声に合わせてハイライト）</div>
    <div id="text-scroll" style="font-size:15px">
      <div class="placeholder" id="text-placeholder">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/>
          <line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/>
        </svg>
        <p>レッスンを選択するとテキストが表示されます<br>
        <small>音声の進行に合わせて自動ハイライトされます<br>テキストをタップすると、その位置から再生します</small></p>
      </div>
    </div>
  </div>
</div>

<!-- TRACK LIST -->
<div class="track-panel" id="track-panel">
  <div style="font-size:.72rem;color:var(--muted);margin-bottom:5px;">🎵 トラック選択</div>
  <div class="track-list" id="track-list"></div>
</div>

<!-- PLAYER -->
<div class="player">
  <div class="player-inner">
    <div class="progress-row">
      <span class="time" id="cur-time">0:00</span>
      <div class="prog-bar" id="prog-bar"><div id="prog-fill"></div></div>
      <span class="time" id="tot-time">0:00</span>
    </div>
    <div class="ctrl-row">
      <button class="cbtn" id="btn-rew" title="10秒戻る">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.77"/>
        </svg>
      </button>
      <button class="cbtn play" id="btn-play">
        <svg id="ico-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="ico-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="cbtn" id="btn-fwd" title="10秒進む">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-.49-3.77"/>
        </svg>
      </button>
      <select class="speed-sel" id="speed-sel">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1.0×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2.0×</option>
      </select>
      <div class="vol-row">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input type="range" id="vol" min="0" max="1" step="0.05" value="1">
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div class="loading-overlay" id="loading"><div class="spinner"></div></div>
<audio id="audio"></audio>

<script>
// ========================================================
// ── PDF.js setup ──
// ========================================================
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const audio       = document.getElementById('audio');
const lessonSel   = document.getElementById('lesson-sel');
const pdfScroll   = document.getElementById('pdf-scroll');
const textScroll  = document.getElementById('text-scroll');
const trackPanel  = document.getElementById('track-panel');
const trackList   = document.getElementById('track-list');
const progFill    = document.getElementById('prog-fill');
const curTimeEl   = document.getElementById('cur-time');
const totTimeEl   = document.getElementById('tot-time');

let pdfDoc     = null;
let curPage    = 1;
let totalPages = 0;
let segments   = [];
let lastHlIdx  = -1;
let fontSize   = 15;
let curLesson  = null;
let curTrackIdx= 0;

// ── Toast ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2200);
}
function loading(show) {
  document.getElementById('loading').classList.toggle('show', show);
}

// ── Build lesson selector ──
LESSONS.forEach((lesson, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = lesson.title;
  lessonSel.appendChild(opt);
});

lessonSel.addEventListener('change', () => loadLesson(parseInt(lessonSel.value)));

async function loadLesson(idx) {
  if (idx < 0 || idx >= LESSONS.length) return;
  curLesson   = LESSONS[idx];
  curTrackIdx = 0;
  audio.pause();
  setPlayIcon(false);

  // PDF
  document.getElementById('pdf-name').textContent = curLesson.pdf;
  await loadPDF(curLesson.pdf);

  // Tracks
  buildTrackList(curLesson.tracks);

  // Load first track
  loadTrack(0);
}

// ── PDF Load ──
async function loadPDF(src) {
  loading(true);
  try {
    pdfDoc     = await pdfjsLib.getDocument(src).promise;
    totalPages = pdfDoc.numPages;
    curPage    = 1;
    await renderAllPages();
    await extractText();
    updatePageInfo();
    toast('PDF読み込み完了');
  } catch(e) {
    console.error(e);
    toast('⚠️ PDFの読み込みに失敗しました: ' + curLesson.pdf);
    document.getElementById('pdf-placeholder').style.display = 'flex';
  } finally {
    loading(false);
  }
}

async function renderAllPages() {
  pdfScroll.innerHTML = '';
  document.getElementById('pdf-placeholder') && (()=>{})();
  for (let i = 1; i <= totalPages; i++) {
    const page     = await pdfDoc.getPage(i);
    const vp       = page.getViewport({ scale: 1.6 });
    const canvas   = document.createElement('canvas');
    canvas.width   = vp.width;
    canvas.height  = vp.height;
    canvas.dataset.page = i;
    pdfScroll.appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  }
}

// ── Text Extraction ──
async function extractText() {
  textScroll.innerHTML = '';
  let paragraphs = [];

  for (let i = 1; i <= totalPages; i++) {
    const page    = await pdfDoc.getPage(i);
    const content = await page.getTextContent();

    // Group items into lines by Y position
    let lines = {};
    content.items.forEach(item => {
      if (!item.str.trim()) return;
      const y = Math.round(item.transform[5]);
      if (!lines[y]) lines[y] = [];
      lines[y].push(item.str);
    });

    // Sort by Y descending (top to bottom), join each line
    const sorted = Object.keys(lines).sort((a,b) => b - a);
    sorted.forEach(y => {
      const line = lines[y].join('').trim();
      if (line) paragraphs.push(line);
    });
    paragraphs.push(''); // page break
  }

  // Build segments from non-empty lines
  segments = [];
  const wrapper = document.createDocumentFragment();

  paragraphs.forEach(line => {
    if (!line) {
      wrapper.appendChild(document.createElement('br'));
      return;
    }

    // Split into sentence-level chunks
    // Japanese: split on 。！？　/ English: split on . ! ?
    const sents = line.split(/(?<=[。！？!?.]["」』]?)\s*/u).filter(s => s.trim());

    sents.forEach(sent => {
      sent = sent.trim();
      if (!sent) return;
      const span = document.createElement('span');
      span.className = 'seg';
      span.textContent = sent + ' ';
      span.dataset.idx = segments.length;
      span.addEventListener('click', () => {
        if (!audio.duration) return;
        audio.currentTime = (parseInt(span.dataset.idx) / segments.length) * audio.duration;
        if (audio.paused) audio.play();
      });
      wrapper.appendChild(span);
      segments.push(span);
    });
  });

  if (segments.length === 0) {
    // Fallback: show raw text
    const p = document.createElement('p');
    p.style.color = 'var(--muted)';
    p.style.padding = '20px';
    p.textContent = '⚠️ このPDFからテキストを抽出できませんでした（スキャン画像の可能性があります）';
    textScroll.appendChild(p);
    return;
  }

  textScroll.appendChild(wrapper);
}

// ── Track management ──
function buildTrackList(tracks) {
  trackList.innerHTML = '';
  if (!tracks || tracks.length === 0) {
    trackPanel.classList.remove('visible');
    return;
  }
  if (tracks.length === 1) {
    trackPanel.classList.remove('visible');
    return;
  }
  tracks.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'track-btn' + (i === 0 ? ' active' : '');
    btn.textContent = t.label || ('Track ' + (i+1));
    btn.dataset.idx = i;
    btn.addEventListener('click', () => loadTrack(i));
    trackList.appendChild(btn);
  });
  trackPanel.classList.add('visible');
}

function loadTrack(idx) {
  if (!curLesson || !curLesson.tracks[idx]) return;
  curTrackIdx = idx;
  audio.pause();
  audio.src = curLesson.tracks[idx].src;
  audio.load();
  setPlayIcon(false);
  resetHighlight();
  // Update active button
  document.querySelectorAll('.track-btn').forEach((b,i) => {
    b.classList.toggle('active', i === idx);
  });
  toast('🎵 ' + (curLesson.tracks[idx].label || 'Track ' + (idx+1)));
}

// ── Audio controls ──
document.getElementById('btn-play').addEventListener('click', () => {
  if (!audio.src || audio.src === window.location.href) {
    toast('レッスンを選択してください');
    return;
  }
  audio.paused ? audio.play() : audio.pause();
});

audio.addEventListener('play',  () => setPlayIcon(true));
audio.addEventListener('pause', () => setPlayIcon(false));
audio.addEventListener('ended', () => {
  setPlayIcon(false);
  // Auto-advance to next track
  if (curLesson && curTrackIdx < curLesson.tracks.length - 1) {
    setTimeout(() => {
      loadTrack(curTrackIdx + 1);
      setTimeout(() => audio.play(), 300);
    }, 800);
  }
});

function setPlayIcon(playing) {
  document.getElementById('ico-play').style.display  = playing ? 'none'  : 'block';
  document.getElementById('ico-pause').style.display = playing ? 'block' : 'none';
}

document.getElementById('btn-rew').onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 10); };
document.getElementById('btn-fwd').onclick = () => { audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 10); };
document.getElementById('speed-sel').addEventListener('change', e => { audio.playbackRate = parseFloat(e.target.value); });
document.getElementById('vol').addEventListener('input', e => { audio.volume = parseFloat(e.target.value); });

audio.addEventListener('loadedmetadata', () => {
  totTimeEl.textContent = fmtTime(audio.duration);
});

audio.addEventListener('timeupdate', () => {
  const cur = audio.currentTime, dur = audio.duration || 1;
  progFill.style.width = (cur / dur * 100) + '%';
  curTimeEl.textContent = fmtTime(cur);
  updateHighlight(cur / dur);
});

document.getElementById('prog-bar').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * (audio.duration || 0);
});

// ── Highlight ──
function updateHighlight(ratio) {
  if (!segments.length) return;
  const idx = Math.min(Math.floor(ratio * segments.length), segments.length - 1);
  if (idx === lastHlIdx) return;
  lastHlIdx = idx;
  segments.forEach((s, i) => {
    s.classList.remove('now', 'past');
    if (i < idx)  s.classList.add('past');
    if (i === idx) s.classList.add('now');
  });
  segments[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetHighlight() {
  lastHlIdx = -1;
  segments.forEach(s => s.classList.remove('now', 'past'));
}

// ── PDF page tracking ──
pdfScroll.addEventListener('scroll', () => {
  const mid = pdfScroll.scrollTop + pdfScroll.clientHeight / 2;
  let p = 1;
  pdfScroll.querySelectorAll('canvas').forEach(c => { if (c.offsetTop <= mid) p = parseInt(c.dataset.page); });
  curPage = p;
  updatePageInfo();
});
function updatePageInfo() {
  document.getElementById('page-info').textContent = totalPages ? `${curPage} / ${totalPages}` : '- / -';
}
document.getElementById('prev-page').onclick = () => { if (curPage > 1) scrollToPage(curPage - 1); };
document.getElementById('next-page').onclick = () => { if (curPage < totalPages) scrollToPage(curPage + 1); };
function scrollToPage(n) {
  const c = pdfScroll.querySelector(`canvas[data-page="${n}"]`);
  if (c) { c.scrollIntoView({ behavior: 'smooth' }); curPage = n; updatePageInfo(); }
}

// ── Font size ──
document.getElementById('font-up').onclick   = () => { fontSize = Math.min(fontSize+2, 28); textScroll.style.fontSize = fontSize+'px'; };
document.getElementById('font-down').onclick = () => { fontSize = Math.max(fontSize-2, 10); textScroll.style.fontSize = fontSize+'px'; };

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space')       { e.preventDefault(); document.getElementById('btn-play').click(); }
  if (e.code === 'ArrowLeft')   audio.currentTime = Math.max(0, audio.currentTime - 10);
  if (e.code === 'ArrowRight')  audio.currentTime = Math.min(audio.duration||0, audio.currentTime + 10);
});

// ── Format time ──
function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), ss = Math.floor(s % 60).toString().padStart(2,'0');
  return `${m}:${ss}`;
}

// ── Auto-load first lesson ──
if (LESSONS.length > 0) {
  loadLesson(0);
}
</script>
</body>
