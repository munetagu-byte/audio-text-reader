<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テキスト＆音声リーダー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eaeaea;
    --text-muted: #8892a4;
    --highlight: rgba(233, 69, 96, 0.3);
    --highlight-current: rgba(233, 69, 96, 0.7);
    --border: #2a3a5c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    background: linear-gradient(135deg, #e94560, #533483);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }
  .upload-area {
    display: flex;
    gap: 10px;
    flex: 1;
    flex-wrap: wrap;
  }
  .upload-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px dashed var(--border);
    background: var(--card);
    color: var(--text-muted);
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--text); }
  .upload-btn.loaded { border-color: #4caf50; color: #4caf50; border-style: solid; }
  .upload-btn svg { flex-shrink: 0; }
  input[type=file] { display: none; }

  .font-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }
  .font-controls span { font-size: 0.75rem; color: var(--text-muted); }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: var(--accent2); }

  /* ── MAIN ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* PDF panel */
  .pdf-panel {
    width: 50%;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #111;
  }
  .pdf-panel-header {
    background: var(--panel);
    padding: 6px 12px;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .page-nav { display: flex; align-items: center; gap: 8px; }
  .page-nav button {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 2px 8px; border-radius: 4px;
    cursor: pointer; font-size: 0.75rem;
  }
  .page-nav button:hover { background: var(--accent2); }
  #pdf-scroll {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    gap: 12px;
  }
  #pdf-scroll canvas {
    max-width: 100%;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* Text panel */
  .text-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .text-panel-header {
    background: var(--panel);
    padding: 6px 12px;
    font-size: 0.75rem;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #text-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    line-height: 2;
  }
  .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 10px;
    text-align: center;
  }
  .placeholder svg { opacity: 0.3; }
  .placeholder p { font-size: 0.85rem; }

  /* Text segments */
  .text-segment {
    display: inline;
    border-radius: 3px;
    transition: background 0.3s;
    cursor: pointer;
  }
  .text-segment:hover { background: rgba(83, 52, 131, 0.4); }
  .text-segment.past { background: rgba(233, 69, 96, 0.15); }
  .text-segment.current {
    background: var(--highlight-current);
    border-radius: 3px;
    padding: 0 2px;
    animation: pulse 1s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { background: rgba(233,69,96,0.55); }
    to   { background: rgba(233,69,96,0.85); }
  }

  /* ── AUDIO PLAYER ── */
  .player {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    flex-shrink: 0;
  }
  .player-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .progress-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .time { font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; min-width: 42px; }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    transition: height 0.15s;
  }
  .progress-bar:hover { height: 8px; }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #533483);
    border-radius: 4px;
    width: 0%;
    transition: width 0.1s linear;
    pointer-events: none;
  }
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, transform 0.1s;
    padding: 4px;
  }
  .ctrl-btn:hover { color: var(--accent); transform: scale(1.1); }
  .ctrl-btn.play-btn {
    background: var(--accent);
    border-radius: 50%;
    width: 44px; height: 44px;
    color: white;
  }
  .ctrl-btn.play-btn:hover { background: #c73652; transform: scale(1.05); }

  .speed-select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    margin-left: auto;
  }
  .volume-area {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
  }
  .volume-slider {
    -webkit-appearance: none;
    width: 80px; height: 4px;
    background: var(--border);
    border-radius: 4px;
    cursor: pointer;
  }
  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

  /* Notification toast */
  #toast {
    position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 8px 18px; border-radius: 20px;
    font-size: 0.8rem; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    z-index: 999;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>📖 テキスト＆音声リーダー</h1>
  <div class="upload-area">
    <label class="upload-btn" id="pdf-label" for="pdf-input">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      PDFを読み込む
    </label>
    <input type="file" id="pdf-input" accept=".pdf">

    <label class="upload-btn" id="audio-label" for="audio-input">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      音声を読み込む
    </label>
    <input type="file" id="audio-input" accept=".mp3,.wav,.ogg,.m4a,.aac">
  </div>
  <div class="font-controls">
    <span>文字サイズ</span>
    <button class="icon-btn" id="font-down">A-</button>
    <button class="icon-btn" id="font-up">A+</button>
  </div>
</header>

<!-- MAIN -->
<div class="main">
  <!-- PDF Panel -->
  <div class="pdf-panel">
    <div class="pdf-panel-header">
      <span id="pdf-name">PDFプレビュー</span>
      <div class="page-nav">
        <button id="prev-page">◀</button>
        <span id="page-info">- / -</span>
        <button id="next-page">▶</button>
      </div>
    </div>
    <div id="pdf-scroll">
      <div class="placeholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>PDFファイルを読み込んでください</p>
      </div>
    </div>
  </div>

  <!-- Text Panel -->
  <div class="text-panel">
    <div class="text-panel-header" id="text-panel-header">テキスト（音声に合わせてハイライト）</div>
    <div id="text-scroll" style="font-size:15px">
      <div class="placeholder" id="text-placeholder">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
        <p>PDFを読み込むとテキストが表示されます<br><small>音声の再生に合わせてハイライトされます</small></p>
      </div>
    </div>
  </div>
</div>

<!-- AUDIO PLAYER -->
<div class="player">
  <div class="player-inner">
    <div class="progress-area">
      <span class="time" id="current-time">0:00</span>
      <div class="progress-bar" id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <span class="time" id="total-time">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="btn-rewind" title="10秒戻る">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.77"/></svg>
      </button>
      <button class="ctrl-btn play-btn" id="btn-play">
        <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="ctrl-btn" id="btn-forward" title="10秒進む">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.77"/></svg>
      </button>
      <select class="speed-select" id="speed-select">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1.0×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2.0×</option>
      </select>
      <div class="volume-area">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <input type="range" class="volume-slider" id="volume" min="0" max="1" step="0.05" value="1">
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<audio id="audio"></audio>

<script>
  // ── PDF.js setup ──
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null;
  let currentPage = 1;
  let totalPages = 0;
  let allText = [];      // array of sentence-like segments
  let segments = [];     // DOM spans
  let fontSize = 15;

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── PDF Load ──
  document.getElementById('pdf-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const label = document.getElementById('pdf-label');
    label.textContent = '📄 ' + file.name.slice(0, 22);
    label.classList.add('loaded');
    document.getElementById('pdf-name').textContent = file.name;

    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    currentPage = 1;

    await renderAllPages();
    await extractAllText();
    showToast('PDF読み込み完了');
  });

  async function renderAllPages() {
    const container = document.getElementById('pdf-scroll');
    container.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.dataset.page = i;
      container.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
    }
    updatePageInfo();
  }

  // Scroll-based page tracking
  document.getElementById('pdf-scroll').addEventListener('scroll', () => {
    const canvases = document.querySelectorAll('#pdf-scroll canvas');
    const container = document.getElementById('pdf-scroll');
    const mid = container.scrollTop + container.clientHeight / 2;
    let closest = 1;
    canvases.forEach(c => {
      if (c.offsetTop <= mid) closest = parseInt(c.dataset.page);
    });
    currentPage = closest;
    updatePageInfo();
  });

  function updatePageInfo() {
    document.getElementById('page-info').textContent =
      totalPages ? `${currentPage} / ${totalPages}` : '- / -';
  }

  document.getElementById('prev-page').onclick = () => {
    if (currentPage > 1) scrollToPage(currentPage - 1);
  };
  document.getElementById('next-page').onclick = () => {
    if (currentPage < totalPages) scrollToPage(currentPage + 1);
  };
  function scrollToPage(n) {
    const c = document.querySelector(`#pdf-scroll canvas[data-page="${n}"]`);
    if (c) c.scrollIntoView({ behavior: 'smooth' });
    currentPage = n;
    updatePageInfo();
  }

  // ── Text Extraction ──
  async function extractAllText() {
    let rawText = '';
    for (let i = 1; i <= totalPages; i++) {
      const page = await pdfDoc.getPage(i);
      const content = await page.getTextContent();
      rawText += content.items.map(item => item.str).join(' ') + '\n';
    }

    // Split into sentence-like segments
    // Split on 。！？.!? followed by space or newline, keeping delimiter
    const raw = rawText
      .replace(/\r\n/g, '\n')
      .replace(/\n{3,}/g, '\n\n');

    // Split into paragraphs first, then sentences
    const paragraphs = raw.split(/\n\n+/);
    allText = [];
    paragraphs.forEach(para => {
      para = para.trim();
      if (!para) return;
      // Split on Japanese/English sentence endings
      const sentences = para.split(/(?<=[。！？.!?])\s*/);
      sentences.forEach(s => {
        s = s.trim();
        if (s.length > 2) allText.push(s);
      });
      allText.push('\n'); // paragraph break
    });

    renderTextPanel();
  }

  function renderTextPanel() {
    const container = document.getElementById('text-scroll');
    container.innerHTML = '';
    segments = [];

    allText.forEach((seg, i) => {
      if (seg === '\n') {
        container.appendChild(document.createElement('br'));
        container.appendChild(document.createElement('br'));
        return;
      }
      const span = document.createElement('span');
      span.className = 'text-segment';
      span.textContent = seg + ' ';
      span.dataset.index = segments.length;
      span.addEventListener('click', () => seekToSegment(parseInt(span.dataset.index)));
      container.appendChild(span);
      segments.push(span);
    });
  }

  function seekToSegment(idx) {
    const audio = document.getElementById('audio');
    if (!audio.duration) return;
    const t = (idx / segments.length) * audio.duration;
    audio.currentTime = t;
    if (audio.paused) audio.play();
  }

  // ── Font size ──
  document.getElementById('font-up').onclick = () => {
    fontSize = Math.min(fontSize + 2, 28);
    document.getElementById('text-scroll').style.fontSize = fontSize + 'px';
  };
  document.getElementById('font-down').onclick = () => {
    fontSize = Math.max(fontSize - 2, 10);
    document.getElementById('text-scroll').style.fontSize = fontSize + 'px';
  };

  // ── Audio ──
  const audio = document.getElementById('audio');
  let isPlaying = false;

  document.getElementById('audio-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const label = document.getElementById('audio-label');
    label.textContent = '🎵 ' + file.name.slice(0, 22);
    label.classList.add('loaded');
    audio.src = URL.createObjectURL(file);
    audio.load();
    showToast('音声読み込み完了');
  });

  // Play / Pause
  document.getElementById('btn-play').addEventListener('click', () => {
    if (audio.src === '' || audio.src === window.location.href) {
      showToast('音声ファイルを読み込んでください');
      return;
    }
    if (audio.paused) audio.play();
    else audio.pause();
  });

  audio.addEventListener('play', () => {
    isPlaying = true;
    document.getElementById('icon-play').style.display = 'none';
    document.getElementById('icon-pause').style.display = 'block';
  });
  audio.addEventListener('pause', () => {
    isPlaying = false;
    document.getElementById('icon-play').style.display = 'block';
    document.getElementById('icon-pause').style.display = 'none';
  });
  audio.addEventListener('ended', () => {
    isPlaying = false;
    document.getElementById('icon-play').style.display = 'block';
    document.getElementById('icon-pause').style.display = 'none';
  });

  // Rewind / Forward
  document.getElementById('btn-rewind').onclick = () => { audio.currentTime = Math.max(0, audio.currentTime - 10); };
  document.getElementById('btn-forward').onclick = () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); };

  // Speed
  document.getElementById('speed-select').addEventListener('change', (e) => {
    audio.playbackRate = parseFloat(e.target.value);
  });

  // Volume
  document.getElementById('volume').addEventListener('input', (e) => {
    audio.volume = parseFloat(e.target.value);
  });

  // Duration / Time
  audio.addEventListener('loadedmetadata', () => {
    document.getElementById('total-time').textContent = formatTime(audio.duration);
  });

  // Progress update
  audio.addEventListener('timeupdate', () => {
    const cur = audio.currentTime;
    const dur = audio.duration || 1;
    const pct = (cur / dur) * 100;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('current-time').textContent = formatTime(cur);
    updateHighlight(cur / dur);
  });

  // Click on progress bar
  document.getElementById('progress-bar').addEventListener('click', (e) => {
    const bar = e.currentTarget;
    const rect = bar.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * (audio.duration || 0);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
    if (e.code === 'ArrowLeft') audio.currentTime = Math.max(0, audio.currentTime - 10);
    if (e.code === 'ArrowRight') audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10);
    if (e.code === 'ArrowUp') { e.preventDefault(); audio.volume = Math.min(1, audio.volume + 0.1); document.getElementById('volume').value = audio.volume; }
    if (e.code === 'ArrowDown') { e.preventDefault(); audio.volume = Math.max(0, audio.volume - 0.1); document.getElementById('volume').value = audio.volume; }
  });

  // ── Highlight ──
  let lastHighlightIdx = -1;
  function updateHighlight(ratio) {
    if (!segments.length) return;
    const targetIdx = Math.floor(ratio * segments.length);
    if (targetIdx === lastHighlightIdx) return;
    lastHighlightIdx = targetIdx;

    segments.forEach((s, i) => {
      s.classList.remove('current', 'past');
      if (i < targetIdx) s.classList.add('past');
      else if (i === targetIdx) s.classList.add('current');
    });

    // Auto-scroll text panel
    if (segments[targetIdx]) {
      segments[targetIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // ── Format time ──
  function formatTime(sec) {
    if (!sec || isNaN(sec)) return '0:00';
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, '0');
    return `${m}:${s}`;
  }

  // ── Page-scroll sync for PDF ──
  document.getElementById('pdf-scroll').addEventListener('scroll', updatePageInfo);
</script>
</body>
</html>
